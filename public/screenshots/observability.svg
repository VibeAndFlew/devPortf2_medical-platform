<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#ffffff" rx="8"/>
  <defs>
    <linearGradient id="obsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <!-- Header -->
  <rect x="24" y="16" width="752" height="52" fill="#0f172a" rx="10"/>
  <text x="44" y="48" font-family="system-ui" font-size="15" font-weight="700" fill="#ffffff">Observability Dashboard</text>
  <circle cx="700" cy="42" r="5" fill="#22c55e"/>
  <text x="712" y="46" font-family="system-ui" font-size="10" font-weight="500" fill="#22c55e">All Systems Operational</text>

  <!-- Status row -->
  <rect x="24" y="80" width="180" height="60" fill="#f8fafc" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="100" font-family="system-ui" font-size="10" font-weight="400" fill="#64748b">API Uptime</text>
  <text x="40" y="126" font-family="system-ui" font-size="22" font-weight="700" fill="#1e293b">99.97%</text>
  <circle cx="182" cy="110" r="6" fill="#22c55e"/>

  <rect x="214" y="80" width="180" height="60" fill="#f8fafc" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="230" y="100" font-family="system-ui" font-size="10" font-weight="400" fill="#64748b">Avg Response Time</text>
  <text x="230" y="126" font-family="system-ui" font-size="22" font-weight="700" fill="#1e293b">187ms</text>
  <text x="320" y="126" font-family="system-ui" font-size="10" font-weight="400" fill="#22c55e">p95: 420ms</text>

  <rect x="404" y="80" width="180" height="60" fill="#f8fafc" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="420" y="100" font-family="system-ui" font-size="10" font-weight="400" fill="#64748b">Error Rate</text>
  <text x="420" y="126" font-family="system-ui" font-size="22" font-weight="700" fill="#1e293b">0.03%</text>
  <circle cx="562" cy="110" r="6" fill="#22c55e"/>

  <rect x="594" y="80" width="182" height="60" fill="#f8fafc" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="610" y="100" font-family="system-ui" font-size="10" font-weight="400" fill="#64748b">Active Users</text>
  <text x="610" y="126" font-family="system-ui" font-size="22" font-weight="700" fill="#1e293b">47</text>
  <text x="700" y="126" font-family="system-ui" font-size="10" font-weight="400" fill="#64748b">today</text>

  <!-- Main chart: Response time over time -->
  <rect x="24" y="156" width="488" height="200" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="180" font-family="system-ui" font-size="13" font-weight="600" fill="#1e293b">Response Time (Last 24 Hours)</text>
  <text x="400" y="180" font-family="system-ui" font-size="10" font-weight="400" fill="#64748b">p50 · p95 · p99</text>
  <!-- Sparkline area -->
  <path d="M40 320 L80 280 L120 300 L160 260 L200 240 L240 250 L280 230 L320 220 L360 210 L400 230 L440 200 L480 190" stroke="#2563eb" stroke-width="2" fill="none"/>
  <path d="M40 320 L80 280 L120 300 L160 260 L200 240 L240 250 L280 230 L320 220 L360 210 L400 230 L440 200 L480 190 L480 330 L40 330 Z" fill="#2563eb" opacity="0.05"/>
  <path d="M40 320 L80 300 L120 310 L160 290 L200 270 L240 280 L280 260 L320 250 L360 245 L400 255 L440 235 L480 225" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <path d="M40 320 L80 315 L120 318 L160 310 L200 295 L240 305 L280 290 L320 280 L360 275 L400 285 L440 265 L480 255" stroke="#ef4444" stroke-width="1" fill="none" stroke-dasharray="2 2"/>
  <!-- Y-axis -->
  <text x="20" y="315" font-family="system-ui" font-size="8" fill="#94a3b8">0ms</text>
  <text x="20" y="275" font-family="system-ui" font-size="8" fill="#94a3b8">200ms</text>
  <text x="20" y="235" font-family="system-ui" font-size="8" fill="#94a3b8">400ms</text>
  <text x="20" y="195" font-family="system-ui" font-size="8" fill="#94a3b8">600ms</text>
  <!-- X-axis labels -->
  <text x="50" y="344" font-family="system-ui" font-size="8" fill="#94a3b8">Now</text>
  <text x="200" y="344" font-family="system-ui" font-size="8" fill="#94a3b8">6h ago</text>
  <text x="350" y="344" font-family="system-ui" font-size="8" fill="#94a3b8">12h ago</text>
  <text x="480" y="344" font-family="system-ui" font-size="8" fill="#94a3b8">24h ago</text>
  <!-- Legend -->
  <rect x="40" y="358" width="8" height="8" fill="#2563eb" rx="2"/>
  <text x="52" y="366" font-family="system-ui" font-size="9" fill="#64748b">p50</text>
  <rect x="90" y="358" width="8" height="8" fill="#f59e0b" rx="2"/>
  <text x="102" y="366" font-family="system-ui" font-size="9" fill="#64748b">p95</text>
  <rect x="140" y="358" width="8" height="8" fill="#ef4444" rx="2"/>
  <text x="152" y="366" font-family="system-ui" font-size="9" fill="#64748b">p99</text>

  <!-- Right panel: Services -->
  <rect x="528" y="156" width="248" height="200" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1"/>
  <text x="544" y="180" font-family="system-ui" font-size="13" font-weight="600" fill="#1e293b">Service Health</text>
  <rect x="544" y="192" width="216" height="1" fill="#e2e8f0"/>

  <rect x="544" y="200" width="216" height="28" fill="#ffffff" rx="6"/>
  <circle cx="556" cy="214" r="4" fill="#22c55e"/>
  <text x="566" y="218" font-family="system-ui" font-size="10" font-weight="500" fill="#1e293b">Patient Service</text>
  <text x="720" y="218" font-family="system-ui" font-size="10" font-weight="400" fill="#22c55e">12ms</text>

  <rect x="544" y="232" width="216" height="28" fill="#ffffff" rx="6"/>
  <circle cx="556" cy="246" r="4" fill="#22c55e"/>
  <text x="566" y="250" font-family="system-ui" font-size="10" font-weight="500" fill="#1e293b">Appointment Service</text>
  <text x="720" y="250" font-family="system-ui" font-size="10" font-weight="400" fill="#22c55e">34ms</text>

  <rect x="544" y="264" width="216" height="28" fill="#ffffff" rx="6"/>
  <circle cx="556" cy="278" r="4" fill="#22c55e"/>
  <text x="566" y="282" font-family="system-ui" font-size="10" font-weight="500" fill="#1e293b">Telemedicine Service</text>
  <text x="720" y="282" font-family="system-ui" font-size="10" font-weight="400" fill="#22c55e">56ms</text>

  <rect x="544" y="296" width="216" height="28" fill="#ffffff" rx="6"/>
  <circle cx="556" cy="310" r="4" fill="#f59e0b"/>
  <text x="566" y="314" font-family="system-ui" font-size="10" font-weight="500" fill="#1e293b">EHR Service</text>
  <text x="720" y="314" font-family="system-ui" font-size="10" font-weight="400" fill="#f59e0b">142ms</text>

  <rect x="544" y="328" width="216" height="28" fill="#ffffff" rx="6"/>
  <circle cx="556" cy="342" r="4" fill="#22c55e"/>
  <text x="566" y="346" font-family="system-ui" font-size="10" font-weight="500" fill="#1e293b">Database (PostgreSQL)</text>
  <text x="720" y="346" font-family="system-ui" font-size="10" font-weight="400" fill="#22c55e">8ms</text>

  <!-- Bottom: Recent errors / events -->
  <rect x="24" y="372" width="752" height="104" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="396" font-family="system-ui" font-size="13" font-weight="600" fill="#1e293b">Recent Events</text>
  <text x="700" y="396" font-family="system-ui" font-size="10" font-weight="400" fill="#64748b">Auto-refresh: 30s</text>
  <rect x="40" y="408" width="720" height="1" fill="#e2e8f0"/>

  <circle cx="52" cy="425" r="4" fill="#22c55e"/>
  <text x="64" y="429" font-family="system-ui" font-size="10" font-weight="400" fill="#1e293b">Patient record #3847 updated successfully</text>
  <text x="680" y="429" font-family="system-ui" font-size="9" font-weight="400" fill="#94a3b8">12s ago</text>

  <circle cx="52" cy="445" r="4" fill="#22c55e"/>
  <text x="64" y="449" font-family="system-ui" font-size="10" font-weight="400" fill="#1e293b">Appointment #1245 confirmed — Dr. Chen with Emily Rodriguez</text>
  <text x="680" y="449" font-family="system-ui" font-size="9" font-weight="400" fill="#94a3b8">2m ago</text>

  <circle cx="52" cy="465" r="4" fill="#22c55e"/>
  <text x="64" y="469" font-family="system-ui" font-size="10" font-weight="400" fill="#1e293b">Database backup completed: 1.2GB in 4.3s</text>
  <text x="680" y="469" font-family="system-ui" font-size="9" font-weight="400" fill="#94a3b8">5m ago</text>
</svg>
