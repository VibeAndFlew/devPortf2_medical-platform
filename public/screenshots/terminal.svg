<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#ffffff" rx="8"/>
  <!-- Terminal window -->
  <rect x="40" y="24" width="720" height="440" fill="#0f172a" rx="12"/>
  <!-- Title bar -->
  <rect x="40" y="24" width="720" height="40" fill="#1e293b" rx="12"/>
  <rect x="40" y="40" width="720" height="24" fill="#1e293b" rx="0"/>
  <!-- Traffic lights -->
  <circle cx="64" cy="44" r="6" fill="#ef4444"/>
  <circle cx="84" cy="44" r="6" fill="#f59e0b"/>
  <circle cx="104" cy="44" r="6" fill="#22c55e"/>
  <text x="340" y="48" font-family="system-ui" font-size="11" font-weight="500" fill="#94a3b8">medica-healthcare — terminal</text>

  <!-- Terminal content -->
  <text x="60" y="100" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" fill="#22c55e">$ npm run dev</text>
  <text x="60" y="122" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">
  <tspan fill="#3b82f6">▲</tspan> next dev -p 4004</text>
  <text x="60" y="142" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">  ▲ Next.js 16.2.6</text>
  <text x="60" y="162" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">  - Local:    http://localhost:4004</text>
  <text x="60" y="182" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">  - Network:  http://192.168.1.42:4004</text>

  <text x="60" y="214" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">
  <tspan fill="#22c55e">✓</tspan> Compiled successfully in 1.2s</text>

  <text x="60" y="246" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">
  <tspan fill="#3b82f6">▲</tspan> GET /patients 200 in 42ms</text>
  <text x="60" y="266" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">
  <tspan fill="#3b82f6">▲</tspan> GET /api/patients 200 in 128ms</text>
  <text x="60" y="286" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">
  <tspan fill="#3b82f6">▲</tspan> POST /api/appointments 201 in 234ms</text>
  <text x="60" y="306" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">
  <tspan fill="#f59e0b">⚠</tspan> Rate limit: 87/100 requests used</text>

  <text x="60" y="338" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#22c55e">$ npm run typecheck</text>
  <text x="60" y="358" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">  TypeScript 5.0 — strict mode</text>
  <text x="60" y="378" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#22c55e">  ✓ No type errors found (1,427 files checked)</text>

  <text x="60" y="410" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#22c55e">$ npm run test</text>
  <text x="60" y="430" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">  ✓ All 347 tests passed (12 suites)</text>

  <text x="60" y="454" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#22c55e">$ npm run build</text>
  <text x="60" y="474" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" fill="#94a3b8">  ✓ Build completed in 8.4s (1.2 MB gzipped)</text>
</svg>
