  <line x1="40" y1="380" x2="512" y2="380" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="40" y1="336" x2="512" y2="336" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="40" y1="292" x2="512" y2="292" stroke="#e2e8f0" stroke-width="0.5"/>
  <line x1="40" y1="248" x2="512" y2="248" stroke="#e2e8f0" stroke-width="0.5"/>

  <!-- Right sidebar analytics -->
  <!-- Top diagnoses -->
