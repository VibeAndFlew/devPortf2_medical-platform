  <text x="230" y="456" font-family="system-ui" font-size="9" font-weight="400" fill="#94a3b8">May</text>
  <text x="310" y="456" font-family="system-ui" font-size="9" font-weight="400" fill="#94a3b8">Jul</text>
  <text x="390" y="456" font-family="system-ui" font-size="9" font-weight="400" fill="#94a3b8">Sep</text>
  <text x="460" y="456" font-family="system-ui" font-size="9" font-weight="400" fill="#94a3b8">Nov</text>
