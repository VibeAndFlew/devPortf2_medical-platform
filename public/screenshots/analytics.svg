  <rect x="660" y="398" width="8" height="8" fill="#22c55e" rx="2"/>
  <text x="674" y="406" font-family="system-ui" font-size="10" font-weight="400" fill="#64748b">Telemedicine</text>
  <rect x="660" y="416" width="8" height="8" fill="#f59e0b" rx="2"/>
  <text x="674" y="424" font-family="system-ui" font-size="10" font-weight="400" fill="#64748b">Phone</text>
