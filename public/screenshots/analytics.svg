  <text x="228" y="140" font-family="system-ui" font-size="28" font-weight="700" fill="#1e293b">1,247</text>
  <text x="328" y="140" font-family="system-ui" font-size="11" font-weight="500" fill="#22c55e">↑ 8.1%</text>

  <rect x="400" y="84" width="176" height="88" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1"/>
