  <text x="416" y="140" font-family="system-ui" font-size="28" font-weight="700" fill="#1e293b">11 min</text>
  <text x="516" y="140" font-family="system-ui" font-size="11" font-weight="500" fill="#22c55e">↓ 4 min</text>

