  <text x="660" y="46" font-family="system-ui" font-size="12" font-weight="600" fill="#2563eb">Export Report</text>
  <!-- Date range -->
  <rect x="400" y="26" width="140" height="32" fill="#ffffff" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <text x="418" y="46" font-family="system-ui" font-size="11" font-weight="400" fill="#64748b">May 1 – May 22, 2026</text>
