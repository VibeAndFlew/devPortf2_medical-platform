  <circle cx="600" cy="420" r="40" fill="none" stroke="#2563eb" stroke-width="16" stroke-dasharray="126 126" stroke-dashoffset="0" transform="rotate(-90 600 420)"/>
  <circle cx="600" cy="420" r="40" fill="none" stroke="#22c55e" stroke-width="16" stroke-dasharray="50 202" stroke-dashoffset="-126" transform="rotate(-90 600 420)"/>
  <circle cx="600" cy="420" r="40" fill="none" stroke="#f59e0b" stroke-width="16" stroke-dasharray="30 222" stroke-dashoffset="-176" transform="rotate(-90 600 420)"/>
