  <text x="40" y="140" font-family="system-ui" font-size="28" font-weight="700" fill="#1e293b">4,832</text>
  <text x="140" y="140" font-family="system-ui" font-size="11" font-weight="500" fill="#22c55e">↑ 12.3%</text>

  <rect x="212" y="84" width="176" height="88" fill="#f8fafc" rx="10" stroke="#e2e8f0" stroke-width="1"/>
