  <text x="726" y="244" font-family="system-ui" font-size="10" font-weight="500" fill="#64748b">324</text>
  <text x="544" y="264" font-family="system-ui" font-size="11" font-weight="500" fill="#1e293b">Type 2 Diabetes</text>
  <rect x="640" y="256" width="80" height="6" fill="#2563eb" rx="3" opacity="0.3"/>
  <rect x="640" y="256" width="52" height="6" fill="#2563eb" rx="3"/>
  <text x="726" y="264" font-family="system-ui" font-size="10" font-weight="500" fill="#64748b">267</text>
  <text x="544" y="284" font-family="system-ui" font-size="11" font-weight="500" fill="#1e293b">Upper Respiratory Inf.</text>
  <rect x="640" y="276" width="80" height="6" fill="#2563eb" rx="3" opacity="0.3"/>
  <rect x="640" y="276" width="44" height="6" fill="#2563eb" rx="3"/>
  <text x="726" y="284" font-family="system-ui" font-size="10" font-weight="500" fill="#64748b">198</text>
  <text x="544" y="304" font-family="system-ui" font-size="11" font-weight="500" fill="#1e293b">Hyperlipidemia</text>
  <rect x="640" y="296" width="80" height="6" fill="#2563eb" rx="3" opacity="0.3"/>
  <rect x="640" y="296" width="36" height="6" fill="#2563eb" rx="3"/>
  <text x="726" y="304" font-family="system-ui" font-size="10" font-weight="500" fill="#64748b">145</text>

  <!-- Appointment type breakdown -->
