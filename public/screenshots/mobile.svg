  <rect x="116" y="420" width="168" height="36" fill="#ffffff" rx="6" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="134" cy="438" r="10" fill="#fef3c7"/>
  <text x="130" y="442" font-family="system-ui" font-size="8" font-weight="600" fill="#f59e0b">MG</text>
  <text x="150" y="436" font-family="system-ui" font-size="10" font-weight="500" fill="#1e293b">Maria Gonzalez</text>
  <text x="150" y="448" font-family="system-ui" font-size="8" font-weight="400" fill="#64748b">Follow-up · 10:00</text>
