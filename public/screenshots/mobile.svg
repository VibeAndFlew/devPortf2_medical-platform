  <rect x="260" y="64" width="12" height="14" fill="#ffffff" rx="2" opacity="0.8"/>
  <rect x="246" y="64" width="12" height="14" fill="#ffffff" rx="2" opacity="0.6"/>
  <!-- Bottom nav -->
  <rect x="100" y="440" width="200" height="40" fill="#ffffff" rx="0" stroke="#e2e8f0" stroke-width="1"/>
