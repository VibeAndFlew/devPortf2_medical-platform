  <text x="124" y="186" font-family="system-ui" font-size="16" font-weight="700" fill="#1e293b">6</text>
  <text x="146" y="186" font-family="system-ui" font-size="8" font-weight="400" fill="#94a3b8">appts</text>

  <rect x="204" y="148" width="82" height="50" fill="#ffffff" rx="8" stroke="#e2e8f0" stroke-width="1"/>
