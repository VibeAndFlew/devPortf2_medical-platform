<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <rect width="400" height="500" fill="#ffffff" rx="8"/>
  <!-- Phone frame -->
  <rect x="100" y="20" width="200" height="460" fill="#f8fafc" rx="32" stroke="#e2e8f0" stroke-width="2"/>
