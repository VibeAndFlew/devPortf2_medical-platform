  <rect x="116" y="306" width="56" height="44" fill="#ffffff" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="132" y="312" width="24" height="24" fill="#dbeafe" rx="6"/>
  <text x="124" y="344" font-family="system-ui" font-size="8" font-weight="400" fill="#64748b" text-anchor="middle">New Patient</text>

  <rect x="178" y="306" width="56" height="44" fill="#ffffff" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="194" y="312" width="24" height="24" fill="#dbeafe" rx="6"/>
  <text x="186" y="344" font-family="system-ui" font-size="8" font-weight="400" fill="#64748b" text-anchor="middle">Schedule</text>

  <rect x="240" y="306" width="56" height="44" fill="#ffffff" rx="8" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="256" y="312" width="24" height="24" fill="#dbeafe" rx="6"/>
  <text x="248" y="344" font-family="system-ui" font-size="8" font-weight="400" fill="#64748b" text-anchor="middle">Telemed</text>

